apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-service
  namespace: java-tasks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activity-service
  template:
    metadata:
      labels:
        app: activity-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: activity-service
          image: ghcr.io/kabradshaw1/gen_ai_engineer/java-activity-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: activity-service-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
